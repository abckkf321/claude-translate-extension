<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude.ai 中文界面</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 280px;
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      background: #1a1a2e;
      color: #e8e8f0;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 16px 12px;
      border-bottom: 1px solid #2a2a4a;
    }

    .header-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #cc785c, #d4956a);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }

    .header-subtitle {
      font-size: 11px;
      color: #8888aa;
      margin-top: 1px;
    }

    .body {
      padding: 14px 16px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #2a2a4a;
    }

    .toggle-label {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .toggle-name {
      font-size: 13px;
      color: #e8e8f0;
    }

    .toggle-desc {
      font-size: 11px;
      color: #6666aa;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #3a3a5a;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    input:checked + .slider {
      background: #cc785c;
    }

    input:checked + .slider::before {
      transform: translateX(18px);
    }

    .stats {
      margin-top: 12px;
      padding: 10px 12px;
      background: #151525;
      border-radius: 8px;
      border: 1px solid #2a2a4a;
    }

    .stats-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 0;
      font-size: 12px;
      color: #8888aa;
    }

    .stats-value {
      font-weight: 600;
      color: #cc785c;
    }

    .footer {
      padding: 10px 16px 14px;
      text-align: center;
      font-size: 11px;
      color: #4444666;
    }

    .refresh-btn {
      width: 100%;
      margin-top: 12px;
      padding: 8px;
      background: #cc785c;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .refresh-btn:hover {
      background: #b86848;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 12px;
      margin-top: 8px;
    }

    .status.on {
      background: rgba(204, 120, 92, 0.15);
      color: #cc785c;
    }

    .status.off {
      background: rgba(100, 100, 150, 0.15);
      color: #6666aa;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">中</div>
    <div>
      <div class="header-title">Claude.ai 中文界面</div>
      <div class="header-subtitle">简体中文 UI 翻译插件</div>
    </div>
  </div>

  <div class="body">
    <div class="toggle-row">
      <div class="toggle-label">
        <span class="toggle-name">启用翻译</span>
        <span class="toggle-desc">翻译 Claude.ai 界面文字</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="enableToggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div id="statusArea" style="text-align:center">
      <span class="status on" id="statusBadge">
        <span class="dot"></span>
        翻译中
      </span>
    </div>

    <div class="stats">
      <div class="stats-row">
        <span>词条总数</span>
        <span class="stats-value" id="dictCount">-</span>
      </div>
      <div class="stats-row">
        <span>版本</span>
        <span class="stats-value">1.0.0</span>
      </div>
    </div>

    <button class="refresh-btn" id="refreshBtn">🔄 刷新翻译</button>
  </div>

  <div class="footer">仅翻译界面文字，不影响对话内容</div>

  <script src="popup.js"></script>
</body>
</html>
